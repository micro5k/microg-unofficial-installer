buildscript {
    apply from: 'dependencies.gradle'
}

plugins {
    id 'base'
    id 'maven-publish'
    //id 'com.github.hierynomus.license-report' version '0.15.0'
    //id 'com.github.spotbugs' version '4.7.6'
}

develocity.buildScan {
    termsOfUseUrl.set 'https://gradle.com/help/legal-terms-of-use'
    termsOfUseAgree.set 'yes'
    publishing.onlyIf { System.getenv('UPLOAD_BUILD_SCAN') != null }
}

/* ===FUNCTIONS=== */

private void initialize() {
    Properties props = new Properties()

    defaultTasks 'tasks'

    // Define the custom build directory
    layout.buildDirectory = 'output'

    // Load properties from module.prop
    def moduleProp = project.file('zip-content/module.prop')
    if (moduleProp.exists()) {
        moduleProp.withInputStream { props.load(it) }
    }

    description = String.valueOf(props.getProperty('description', 'Unknown flashable ZIP'))
    version = String.valueOf(props.getProperty('version', 'v0.0.0-unknown')).toLowerCase(Locale.ENGLISH).trim()
    group = String.valueOf(props.getProperty('group', 'unknown'))
    ext.projectId = String.valueOf(props.getProperty('id', '')).trim()

    ext.isAlpha = version.endsWith('-alpha')
    //ext.isBeta = version.endsWith('-beta')

    if(JavaVersion.current() < JavaVersion.VERSION_17) {
        throw new GradleException('Java 17 or later is required')
    }
}

private static String getScriptExt() {
    System.getProperty('os.name').toLowerCase(Locale.ROOT).contains('windows') ? '.bat' : '.sh'
}

private Provider<String> getProjectId() {
    project.provider {
        project.findProperty('projectId') ?: { 
            throw new InvalidUserDataException('projectId is empty or null.') 
        }()
    }
}

private Provider<String> getGitCommitHash() {
    providers.exec {
        commandLine 'git', 'rev-parse', '--short=8', 'HEAD'
    }.standardOutput.asText.map{ it.trim() }.orElse('unknown')
}

private Provider<String> getZipName(String variant = '*') {
    getProjectId().zip(getGitCommitHash()) { id, gitCommitHash ->
        "${id}-${project.version}-g${gitCommitHash}-${variant}-by-ale5000-signed.zip"
    }
}

private void configureSigning(def android, File keystorePropsFile) {
    if(!keystorePropsFile.exists()) return
    if(android == null) throw new GradleException('android is null inside configureSigning()')

    println 'Signed build'

    Properties keystoreProps = new Properties()
    keystoreProps.load(new FileInputStream(keystorePropsFile))

    String keyStorePassword
    boolean fallbackToEnv = keystoreProps.containsKey('fallbackToEnv') && keystoreProps['fallbackToEnv'] == 'true'

    if(keystoreProps.containsKey('keyStorePassword'))
        keyStorePassword = keystoreProps['keyStorePassword']
    else if(fallbackToEnv)
        keyStorePassword = System.getenv('KEYSTORE_PASSWORD')

    if(keyStorePassword == null || keyStorePassword.isEmpty())
        throw new InvalidUserDataException('Keystore password is empty')

    android.signingConfigs {
        config {
            storeFile = rootProject.file(keystoreProps['storeFile'])
            storePassword = keyStorePassword
            keyAlias = keystoreProps['keyAlias']
            keyPassword = keyStorePassword
        }
    }

    android.buildTypes.release.signingConfig android.signingConfigs.config
}

initialize()

/* ===BLOCKS=== */

base {
    archivesName.set(getProjectId())
}

/* ==TASKS=== */

gradle.taskGraph.whenReady {
    logger.lifecycle '='*36
    logger.lifecycle "Project: ${project.name}"
    logger.lifecycle "Version: ${project.version}"
    logger.lifecycle "OS:      ${System.getProperty('os.name')}"
    logger.lifecycle '='*36
}

tasks.register('cleanRecoveryOutput', Delete) {
    group = '- Cleanup'
    description = 'Deletes the recovery simulator output directory.'
    delete layout.projectDirectory.dir('recovery-simulator/output')
}

tasks.named('clean') {
    group = '- Cleanup'
    dependsOn tasks.named('cleanRecoveryOutput')
}

tasks.register('cleanCache', Delete) {
    group = '- Cleanup'
    description = 'Deletes the local cache directory.'
    delete layout.projectDirectory.dir('cache')
}

tasks.register('distClean') {
    group = '- Cleanup'
    description = 'Cleans all build outputs, local caches, and removes all untracked/ignored files via Git.'
    dependsOn tasks.named('clean'), tasks.named('cleanCache')

    doLast {
        def gitDir = layout.projectDirectory.dir('.git').asFile
        if(gitDir.exists()) {
            exec {
                commandLine 'git', 'clean', '-xdf'
                ignoreExitValue = true
            }
        } else {
            logger.warn('WARNING: Skipping git clean: .git directory not found.')
        }
    }
}

tasks.register('buildOta', Exec) {
    group = '- Flashable ZIP'
    description = 'Build the flashable zip [Full edition].'

    ['LICENSES', 'conf', 'docs', 'lib', 'zip-content'].each { folder ->
        inputs.dir(layout.projectDirectory.dir(folder)).withPropertyName("inputDir_${folder}")
    }
    inputs.files(
        layout.projectDirectory.dir('tools').asFileTree.matching { include '*.jar' },
        layout.projectDirectory.files('CHANGELOG.rst', 'build.sh'),
        layout.projectDirectory.asFileTree.matching { include 'LICENSE*.rst' }
    ).withPropertyName('inputFiles')

    outputs.file(layout.buildDirectory.file(getZipName('full')))

    workingDir = layout.projectDirectory
    executable = layout.projectDirectory.file("build${getScriptExt()}")

    environment([
        'BUILD_TYPE': 'full',
        'NO_PAUSE'  : '1'
    ])

    doFirst {
        println 'Building the flashable zip with Gradle...'
    }
}

tasks.register('buildOtaOSS', Exec) {
    group = '- Flashable ZIP'
    description = 'Build the flashable zip [OSS edition].'

    ['LICENSES', 'conf', 'docs', 'lib', 'zip-content'].each { folder ->
        inputs.dir(layout.projectDirectory.dir(folder)).withPropertyName("inputDir_${folder}")
    }
    inputs.files(
        layout.projectDirectory.dir('tools').asFileTree.matching { include '*.jar' },
        layout.projectDirectory.files('CHANGELOG.rst', 'build.sh'),
        layout.projectDirectory.asFileTree.matching { include 'LICENSE*.rst' }
    ).withPropertyName('inputFiles')

    outputs.file(layout.buildDirectory.file(getZipName('oss')))

    workingDir = layout.projectDirectory
    executable = layout.projectDirectory.file("build${getScriptExt()}")

    environment([
        'BUILD_TYPE': 'oss',
        'NO_PAUSE'  : '1'
    ])

    doFirst {
        println 'Building the flashable zip (open-source components only) with Gradle...'
    }
}

tasks.named('assemble') {
    group = null
    description = 'Alias of "buildOtaOSS" task.'
    dependsOn tasks.named('buildOtaOSS')
}

tasks.named('build') {
    group = null
    description = 'Alias of "buildOtaOSS" task.'
}

tasks.register('installTest', Exec) {
    group = 'verification'
    description = 'Test the flashable zip in a simulated Android recovery environment on your PC.'
    mustRunAfter build, buildOta, buildOtaOSS

    doFirst {
        environment LIVE_SETUP_ALLOWED: 'false' /* Live setup doesn't work when executed through Gradle */
        environment NO_PAUSE: '1'
        environment BB_GLOBBING: '1'
        executable "${projectDir}/recovery-simulator/recovery" + getScriptExt()
        args "${projectDir}/output/*.zip"
    }
}

tasks.register('test') {
    dependsOn installTest
}

tasks.named('wrapper').configure {
    println 'Gradle: ' + gradleVersionTarget
    gradleVersion = gradleVersionTarget
    distributionSha256Sum = gradleSha256Sum
}

/* === PUBLISHING === */

publishing {
    publications {
        maven(MavenPublication) {
            groupId = 'com.github.micro5k'
            artifactId = getProjectId().get()
            version = project.ext.isAlpha ? "${project.version}-SNAPSHOT" : project.version
            pom {
                name = project.name
                packaging = 'zip'
            }
        }
    }
}

tasks.withType(PublishToMavenLocal).configureEach {
    // Ensure builds run before this task
    mustRunAfter 'build', 'buildOta', 'buildOtaOSS'

    doFirst {
        def zipFiles = layout.buildDirectory.asFileTree.matching {
            include getZipName().get()
        }

        def count = zipFiles.size()
        if(count !in 1..2) {
            throw new GradleException("Publishing failed: Expected 1 or 2 artifacts, but found ${count}. Check if build tasks were executed.")
        }

        // Add artifacts to the publication just before execution
        def mavenPub = project.publishing.publications.maven
        zipFiles.each { foundFile ->
            def isFull = foundFile.name.contains('-full-')
            def isOss = foundFile.name.contains('-oss-')

            if(!isFull && !isOss) {
                throw new GradleException("Publishing failed: File ${foundFile.name} missing a valid build type.")
            }

            mavenPub.artifact(foundFile) {
                if(isFull) {
                    classifier = 'full'
                }
                extension = 'zip'
            }
        }
    }
}
