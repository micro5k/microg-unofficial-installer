  ".public-keys/*.gpg",
  "fastlane/metadata/android/en-US/*.txt",
  "gradle/wrapper/gradle-wrapper.properties",
  ".all-contributorsrc",
  "Gemfile.lock",
  "allowed_signers"
]
SPDX-FileCopyrightText = "NONE"
SPDX-License-Identifier = "CC0-1.0"

[[annotations]]
